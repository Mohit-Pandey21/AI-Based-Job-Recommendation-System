<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recruiter Dashboard - JobNexus</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --admin-primary: #a78bfa;
      --admin-hover: #c4b5fd;
      --admin-glow: rgba(167,139,250,0.18);
      --bg: #07080f;
      --card: rgba(255,255,255,0.04);
      --card-border: rgba(255,255,255,0.09);
      --card-hover: rgba(255,255,255,0.07);
      --text: #eef0f8;
      --text-sub: #6b7494;
      --border: rgba(255,255,255,0.08);
      --danger: #ff4f6a;
      --danger-bg: rgba(255,79,106,0.12);
      --danger-border: rgba(255,79,106,0.35);
      --shadow: rgba(0,0,0,0.5);
      --input-bg: rgba(255,255,255,0.04);
    }

    body.light-mode {
      --admin-primary: #7c3aed;
      --admin-hover: #6d28d9;
      --admin-glow: rgba(124,58,237,0.12);
      --bg: #f0f2f9;
      --card: #ffffff;
      --card-border: #dde1ee;
      --card-hover: #f5f7ff;
      --text: #121526;
      --text-sub: #5a6284;
      --border: #dde1ee;
      --danger: #dc2626;
      --danger-bg: rgba(220,38,38,0.07);
      --danger-border: rgba(220,38,38,0.3);
      --shadow: rgba(0,0,0,0.1);
      --input-bg: #f8f9fc;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background-color 0.35s, color 0.35s;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 900px 600px at 80% 10%, rgba(167,139,250,0.055) 0%, transparent 70%),
        radial-gradient(ellipse 700px 500px at 10% 80%, rgba(0,194,255,0.04) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px);
      background-size: 44px 44px;
      pointer-events: none;
      z-index: 0;
    }

    body.light-mode::before {
      background:
        radial-gradient(ellipse 900px 600px at 80% 10%, rgba(124,58,237,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 700px 500px at 10% 80%, rgba(0,119,204,0.04) 0%, transparent 70%);
    }
    body.light-mode::after {
      background-image:
        linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
    }

    /* Navbar */
    .navbar {
      background: rgba(7,8,15,0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 0 24px;
      border-bottom: 1px solid var(--card-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 50;
      height: 60px;
    }

    body.light-mode .navbar {
      background: rgba(240,242,249,0.85);
    }

    .brand {
      font-family: 'Syne', sans-serif;
      font-size: 17px;
      font-weight: 800;
      color: var(--admin-primary);
      letter-spacing: -0.01em;
      white-space: nowrap;
    }

    .brand span {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-sub);
      display: block;
      margin-top: -2px;
    }

    .nav-link {
      text-decoration: none;
      color: var(--text-sub);
      font-weight: 500;
      font-size: 13px;
      transition: color 0.2s;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .nav-link:hover { color: var(--text); }

    .theme-btn {
      background: var(--card);
      border: 1px solid var(--card-border);
      color: var(--text);
      padding: 7px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .theme-btn:hover {
      border-color: var(--admin-primary);
      color: var(--admin-primary);
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    /* Container */
    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 36px 20px 60px;
      position: relative;
      z-index: 1;
    }

    .header-box {
      text-align: center;
      margin-bottom: 32px;
    }

    .header-eyebrow {
      font-family: 'Syne', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--admin-primary);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .header-eyebrow::before, .header-eyebrow::after {
      content: '';
      display: block;
      width: 22px;
      height: 1px;
      background: var(--admin-primary);
      opacity: 0.6;
    }

    .header-box h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(22px, 4vw, 30px);
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--text) 40%, var(--admin-primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .header-box p {
      color: var(--text-sub);
      font-size: 14px;
    }

    /* Cards */
    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 28px;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      margin-bottom: 20px;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 22px;
    }

    .card-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--admin-primary), rgba(167,139,250,0.4));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      box-shadow: 0 0 14px var(--admin-glow);
    }

    .card h2 {
      font-family: 'Syne', sans-serif;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .card-desc {
      font-size: 12px;
      color: var(--text-sub);
      margin-top: 1px;
    }

    .form-group { margin-bottom: 18px; }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 12px;
      color: var(--text-sub);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-family: 'Syne', sans-serif;
    }

    input, textarea {
      width: 100%;
      padding: 13px 16px;
      border: 1px solid var(--card-border);
      background: var(--input-bg);
      color: var(--text);
      border-radius: 12px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input::placeholder, textarea::placeholder { color: var(--text-sub); }
    textarea { resize: vertical; }
    input:focus, textarea:focus {
      outline: none;
      border-color: var(--admin-primary);
      box-shadow: 0 0 0 3px var(--admin-glow);
    }

    button.btn-submit {
      background: var(--admin-primary);
      color: #fff;
      border: none;
      padding: 14px 20px;
      border-radius: 12px;
      font-weight: 700;
      font-family: 'Syne', sans-serif;
      cursor: pointer;
      width: 100%;
      font-size: 14px;
      letter-spacing: 0.04em;
      transition: all 0.2s;
      box-shadow: 0 0 22px var(--admin-glow);
    }
    button.btn-submit:hover {
      background: var(--admin-hover);
      box-shadow: 0 0 30px var(--admin-glow);
      transform: translateY(-1px);
    }
    button.btn-submit:active { transform: translateY(0); }

    /* Manage Section */
    .search-manage {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      align-items: center;
    }
    .search-manage input {
      flex: 1 1 240px;
      min-width: 160px;
    }
    .search-manage button {
      width: auto;
      flex: 0 0 auto;
      padding: 13px 20px;
    }

    .job-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      border-radius: 12px;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 6px;
      border: 1px solid var(--border);
      transition: background 0.18s;
    }
    .job-row:hover { background: var(--card-hover); }

    .job-row-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 3px;
    }

    .job-row-company {
      font-size: 12px;
      color: var(--text-sub);
    }

    .btn-delete {
      background: var(--danger-bg);
      color: var(--danger);
      border: 1px solid var(--danger-border);
      padding: 8px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      white-space: nowrap;
      transition: all 0.2s;
      letter-spacing: 0.02em;
    }
    .btn-delete:hover {
      background: rgba(255,79,106,0.2);
      border-color: var(--danger);
    }

    .status-msg {
      margin-top: 14px;
      padding: 12px 16px;
      border-radius: 12px;
      display: none;
      text-align: center;
      font-weight: 600;
      font-size: 13px;
    }
    .success {
      background: rgba(34,197,94,0.1);
      color: #4ade80;
      border: 1px solid rgba(34,197,94,0.25);
    }
    .error {
      background: var(--danger-bg);
      color: var(--danger);
      border: 1px solid var(--danger-border);
    }
    body.light-mode .success {
      background: #dcfce7;
      color: #166534;
    }

    .empty-state {
      text-align: center;
      padding: 24px;
      color: var(--text-sub);
      font-size: 13px;
    }

    @media (max-width: 520px) {
      .navbar { padding: 0 14px; }
      .container { padding: 24px 14px 40px; }
      .card { padding: 20px; }
      .search-manage button { width: 100%; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="brand">
      ⚡ JobNexus
      <span>Admin Panel</span>
    </div>
    <div class="nav-right">
      <a href="/" class="nav-link">← Back to App</a>
      <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">🌙 Dark Mode</button>
    </div>
  </nav>

  <div class="container">
    <div class="header-box">
      <div class="header-eyebrow">Recruiter Dashboard</div>
      <h1>Manage Vacancies</h1>
      <p>Post new opportunities or manage existing listings.</p>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-icon">📝</div>
        <div>
          <h2>Post a New Job</h2>
          <div class="card-desc">Fill in the details to go live immediately</div>
        </div>
      </div>

      <div class="form-group">
        <label>Job Title</label>
        <input type="text" id="p_title" placeholder="e.g. Senior Data Analyst">
      </div>

      <div class="form-group">
        <label>Company Name</label>
        <input type="text" id="p_company" placeholder="e.g. Example Corp">
      </div>

      <div class="form-group">
        <label>Location</label>
        <input type="text" id="p_city" placeholder="e.g. Delhi (or Remote)">
      </div>

      <div class="form-group">
        <label>Job Description</label>
        <textarea id="p_desc" rows="4" placeholder="Describe the role, responsibilities, and requirements..."></textarea>
      </div>

      <button class="btn-submit" onclick="postJob()" id="postBtn">🚀 Post Job Live</button>
      <div id="postStatus" class="status-msg"></div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-icon" style="background: linear-gradient(135deg, var(--danger), rgba(255,79,106,0.4)); box-shadow: 0 0 14px rgba(255,79,106,0.2);">🗑️</div>
        <div>
          <h2>Manage Vacancies</h2>
          <div class="card-desc">Search and remove active listings</div>
        </div>
      </div>

      <div class="search-manage">
        <input type="text" id="m_search" placeholder="Search job title...">
        <button class="btn-submit" style="width: auto;" onclick="searchManage()">Search</button>
      </div>

      <div id="manageResults"></div>
    </div>
  </div>

  <script>
    function toggleTheme() {
      const body = document.body;
      const btn = document.getElementById('themeBtn');
      body.classList.toggle('light-mode');

      if (body.classList.contains('light-mode')) {
        btn.innerHTML = '🌑 Dark Mode';
        localStorage.setItem('theme', 'light');
      } else {
        btn.innerHTML = '🌙 Dark Mode';
        localStorage.setItem('theme', 'dark');
      }
    }

    (function loadTheme() {
      const savedTheme = localStorage.getItem('theme');
      const btn = document.getElementById('themeBtn');
      if (savedTheme === 'light') {
        document.body.classList.add('light-mode');
        if (btn) btn.innerHTML = '🌑 Dark Mode';
      }
    })();

    async function postJob() {
      const btn = document.getElementById('postBtn');
      const status = document.getElementById('postStatus');

      const data = {
        title: document.getElementById('p_title').value,
        company: document.getElementById('p_company').value,
        city: document.getElementById('p_city').value,
        desc: document.getElementById('p_desc').value
      };

      if (!data.title || !data.desc) {
        alert("Please fill in Title and Description");
        return;
      }

      btn.disabled = true;
      btn.innerText = "Posting...";

      try {
        const res = await fetch('/api/add_job', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        const result = await res.json();

        if (!res.ok || result.error) {
          throw new Error(result.error || "Failed");
        }

        status.className = "status-msg success";
        status.innerText = `✅ Success! Job ID ${result.id} is now live.`;
        status.style.display = 'block';

        document.getElementById('p_title').value = '';
        document.getElementById('p_company').value = '';
        document.getElementById('p_city').value = '';
        document.getElementById('p_desc').value = '';
      } catch (err) {
        status.className = "status-msg error";
        status.innerText = `Error Posting Job: ${err.message}`;
        status.style.display = 'block';
      }

      btn.disabled = false;
      btn.innerText = "🚀 Post Job Live";
    }

    async function searchManage() {
      const query = document.getElementById('m_search').value;
      const container = document.getElementById('manageResults');

      container.innerHTML = '<div class="empty-state">Searching...</div>';

      try {
        const res = await fetch('/api/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: query })
        });

        const jobs = await res.json();
        container.innerHTML = '';

        if (!Array.isArray(jobs) || jobs.length === 0) {
          container.innerHTML = '<div class="empty-state">No active jobs found.</div>';
          return;
        }

        jobs.slice(0, 5).forEach(job => {
          const row = `
            <div class="job-row" id="row-${job.id}">
              <div>
                <div class="job-row-title">${escapeHtml(job.title || '')}</div>
                <div class="job-row-company">${escapeHtml(job.company || '')}</div>
              </div>
              <button class="btn-delete" onclick="deleteJob(${Number(job.id)})">Remove</button>
            </div>
          `;
          container.innerHTML += row;
        });

      } catch (e) {
        container.innerHTML = '<div class="empty-state">Backend error.</div>';
      }
    }

    async function deleteJob(id) {
      if (!confirm("Are you sure you want to close this vacancy? It will disappear from search.")) return;

      try {
        const res = await fetch('/api/delete_job', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: id })
        });

        const result = await res.json();

        if (res.ok && result.status === 'success') {
          const row = document.getElementById(`row-${id}`);
          if (row) row.style.display = 'none';
          alert("Vacancy Closed.");
        } else {
          alert("Job not found or could not be deleted.");
        }
      } catch (err) {
        alert("Error deleting job.");
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
